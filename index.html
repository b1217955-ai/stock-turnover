<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>株 売買回転日数チャート</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;background:#f7f6f3;color:#1a1a1a;font-size:14px}
header{position:sticky;top:0;background:#fff;border-bottom:2px solid #f97316;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;z-index:10}
header h1{font-size:16px;font-weight:700;color:#f97316}
header .updated{font-size:11px;color:#888}
.wrap{max-width:1200px;margin:0 auto;padding:16px}
.chips-area{background:#fff;border-radius:8px;padding:12px 16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.chips-area .label{font-size:11px;color:#888;margin-bottom:8px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{background:#fff3e8;border:1px solid #f97316;color:#c2570a;border-radius:20px;padding:3px 12px;font-size:12px;cursor:pointer;transition:background .15s}
.chip:hover{background:#f97316;color:#fff}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:700px){.compare-grid{grid-template-columns:1fr}}
.panel{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden}
.panel-header{padding:12px 14px;border-bottom:1px solid #f0f0f0;display:flex;gap:8px;align-items:center}
.panel-header input{border:1px solid #ddd;border-radius:6px;padding:6px 10px;font-size:13px;flex:1;outline:none;min-width:0}
.panel-header input:focus{border-color:#f97316}
.panel-header button{background:#f97316;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;font-weight:600;white-space:nowrap}
.panel-header button:hover{background:#ea6c0e}
.panel-header button:disabled{background:#ccc;cursor:not-allowed}
.panel-stats{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid #f0f0f0}
.stat{padding:10px 8px;text-align:center;border-right:1px solid #f0f0f0}
.stat:last-child{border-right:none}
.stat .slabel{font-size:10px;color:#aaa;margin-bottom:3px}
.stat .sval{font-size:16px;font-weight:700;color:#f97316}
.stat .sunit{font-size:10px;color:#bbb}
.panel-chart{padding:12px;height:260px;position:relative}
.panel-msg{padding:40px 16px;text-align:center;color:#aaa;font-size:12px;white-space:pre-line}
.panel-msg.loading{color:#f97316}
.panel-msg.error{color:#e53e3e}
.panel-name{padding:8px 14px;font-size:12px;font-weight:600;color:#555;border-bottom:1px solid #f0f0f0}
footer{text-align:center;padding:14px;font-size:11px;color:#aaa;line-height:1.8;margin-top:8px}
</style>
</head>
<body>
<header>
  <h1>📈 株 売買回転日数チャート</h1>
  <span class="updated" id="updated"></span>
</header>
<div class="wrap">
  <div class="chips-area">
    <div class="label">クリックで左右いずれかのパネルに表示</div>
    <div class="chips" id="chips"></div>
  </div>
  <div class="compare-grid">
    <div class="panel" id="panel-0">
      <div class="panel-header">
        <input type="text" placeholder="銘柄コード（例: 7203）" maxlength="8" onkeydown="if(event.key==='Enter')search(0)">
        <button onclick="search(0)">表示</button>
      </div>
      <div class="panel-msg">銘柄コードを入力してください</div>
    </div>
    <div class="panel" id="panel-1">
      <div class="panel-header">
        <input type="text" placeholder="銘柄コード（例: 9984）" maxlength="8" onkeydown="if(event.key==='Enter')search(1)">
        <button onclick="search(1)">表示</button>
      </div>
      <div class="panel-msg">銘柄コードを入力してください</div>
    </div>
  </div>
</div>
<footer>
  データ: Yahoo Finance / kabutan.jp ／ 売買回転日数 = 発行済株式数 ÷ 日次出来高<br>
  ※ 情報提供のみが目的です。投資判断の根拠としないでください。
</footer>

<script src="data.js"></script>
<script>
const PROXY = 'https://corsproxy.io/?';
const charts = [null, null];

function init() {
  if (!window.TURNOVER_META) return;
  document.getElementById("updated").textContent = "最終更新: " + TURNOVER_META.updated;
  const chips = document.getElementById("chips");
  TURNOVER_META.tickers.forEach(code => {
    const d = TURNOVER_DATA[code];
    if (!d) return;
    const el = document.createElement("span");
    el.className = "chip";
    el.textContent = code + " " + shortName(d.name);
    el.onclick = () => chipClick(code);
    chips.appendChild(el);
  });
  // 左右に最初の2銘柄を自動表示
  const tickers = TURNOVER_META.tickers;
  if (tickers[0]) { setInput(0, tickers[0]); search(0); }
  if (tickers[1]) { setInput(1, tickers[1]); search(1); }
}

let lastChip = 0;
function chipClick(code) {
  setInput(lastChip, code);
  search(lastChip);
  lastChip = 1 - lastChip;
}

function shortName(name) {
  return name.length > 7 ? name.slice(0, 7) + "…" : name;
}

function setInput(idx, code) {
  document.querySelector(`#panel-${idx} input`).value = code;
}

async function search(idx) {
  const code = document.querySelector(`#panel-${idx} input`).value.trim().replace(/[．.]/g, "");
  if (!code) return;
  const btn = document.querySelector(`#panel-${idx} button`);
  btn.disabled = true; btn.textContent = "取得中";
  setMsg(idx, "取得中...", "loading");

  try {
    const d = window.TURNOVER_DATA?.[code] || await fetchLive(code);
    showChart(idx, code, d);
  } catch(e) {
    setMsg(idx, "エラー: " + e.message, "error");
  } finally {
    btn.disabled = false; btn.textContent = "表示";
  }
}

function setMsg(idx, text, cls = "") {
  const panel = document.getElementById(`panel-${idx}`);
  let msg = panel.querySelector(".panel-msg");
  if (!msg) { msg = document.createElement("div"); panel.appendChild(msg); }
  // 古い描画要素を消す
  panel.querySelectorAll(".panel-name,.panel-stats,.panel-chart").forEach(e => e.remove());
  msg.className = "panel-msg " + cls;
  msg.textContent = text;
  msg.style.display = "";
  if (charts[idx]) { charts[idx].destroy(); charts[idx] = null; }
}

function showChart(idx, code, d) {
  const panel = document.getElementById(`panel-${idx}`);
  panel.querySelectorAll(".panel-msg,.panel-name,.panel-stats,.panel-chart").forEach(e => e.remove());
  if (charts[idx]) { charts[idx].destroy(); charts[idx] = null; }

  const t = d.turnover;
  const latest = t[t.length - 1];
  const max = Math.max(...t);
  const min = Math.min(...t);

  // 銘柄名行
  const nameDiv = document.createElement("div");
  nameDiv.className = "panel-name";
  nameDiv.textContent = d.name + "（" + code + "）";
  panel.appendChild(nameDiv);

  // 統計行
  const statsDiv = document.createElement("div");
  statsDiv.className = "panel-stats";
  statsDiv.innerHTML = `
    <div class="stat"><div class="slabel">最新 回転日数</div><div class="sval">${latest.toLocaleString()}</div><div class="sunit">日</div></div>
    <div class="stat"><div class="slabel">最大値</div><div class="sval">${max.toLocaleString()}</div><div class="sunit">日</div></div>
    <div class="stat"><div class="slabel">最小値</div><div class="sval">${min.toLocaleString()}</div><div class="sunit">日</div></div>`;
  panel.appendChild(statsDiv);

  // チャート
  const chartDiv = document.createElement("div");
  chartDiv.className = "panel-chart";
  const canvas = document.createElement("canvas");
  chartDiv.appendChild(canvas);
  panel.appendChild(chartDiv);

  charts[idx] = new Chart(canvas.getContext("2d"), {
    type: "line",
    data: {
      labels: d.dates,
      datasets: [{
        data: t,
        borderColor: idx === 0 ? "#f97316" : "#3b82f6",
        backgroundColor: idx === 0 ? "rgba(249,115,22,0.07)" : "rgba(59,130,246,0.07)",
        pointRadius: 2, pointHoverRadius: 5,
        tension: 0.1, fill: true, borderWidth: 2
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: {display: false},
        tooltip: {callbacks: {
          title: c => c[0].label,
          label: c => "回転日数: " + c.parsed.y.toLocaleString() + " 日",
          afterLabel: c => "出来高: " + d.volumes[c.dataIndex].toLocaleString() + " 株"
        }}
      },
      scales: {
        x: {ticks: {maxTicksLimit: 8, maxRotation: 30}, grid: {color: "#f0f0f0"}},
        y: {beginAtZero: false, title: {display: true, text: "日数"}, grid: {color: "#f0f0f0"}}
      }
    }
  });
}

async function fetchLive(code) {
  const kr = await fetch(PROXY + encodeURIComponent(`https://kabutan.jp/stock/?code=${code}`));
  const html = await kr.text();
  const sm = html.match(/発行済株式数<\/th>\s*<td>([\d,]+)&nbsp;株/);
  if (!sm) throw new Error("銘柄が見つかりません（" + code + "）");
  const shares = parseInt(sm[1].replace(/,/g, ""));
  const nm = html.match(/<title>([^【]+)【/);
  const name = nm ? nm[1].trim() : code;

  const cr = await fetch(PROXY + encodeURIComponent(`https://query2.finance.yahoo.com/v8/finance/chart/${code}.T?range=6mo&interval=1d`));
  const cj = await cr.json();
  const result = cj?.chart?.result?.[0];
  if (!result) throw new Error("株価データが取得できません");

  const timestamps = result.timestamp || [];
  const volumes = result.indicators?.quote?.[0]?.volume || [];
  const dates = [], vols = [], turnover = [];
  for (let i = 0; i < timestamps.length; i++) {
    const v = volumes[i];
    if (!v || v === 0) continue;
    dates.push(new Date(timestamps[i] * 1000).toISOString().split("T")[0]);
    vols.push(Math.round(v));
    turnover.push(Math.round(shares / v * 10) / 10);
  }
  if (!dates.length) throw new Error("出来高データが取得できません");
  return {name, shares, dates, volumes: vols, turnover};
}

window.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
