<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>株 売買回転日数チャート</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;background:#f7f6f3;color:#1a1a1a;font-size:14px}
header{position:sticky;top:0;background:#fff;border-bottom:2px solid #f97316;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;z-index:10}
header h1{font-size:16px;font-weight:700;color:#f97316}
header .updated{font-size:11px;color:#888}
.wrap{max-width:1000px;margin:0 auto;padding:16px}
.search-area{background:#fff;border-radius:8px;padding:14px 16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.search-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.search-row input{border:1px solid #ddd;border-radius:6px;padding:8px 12px;font-size:14px;width:160px;outline:none}
.search-row input:focus{border-color:#f97316}
.search-row button{background:#f97316;color:#fff;border:none;border-radius:6px;padding:8px 18px;font-size:14px;cursor:pointer;font-weight:600}
.search-row button:hover{background:#ea6c0e}
.search-row button:disabled{background:#ccc;cursor:not-allowed}
.chips{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px}
.chip{background:#fff3e8;border:1px solid #f97316;color:#c2570a;border-radius:20px;padding:3px 12px;font-size:12px;cursor:pointer;transition:background .15s}
.chip:hover,.chip.active{background:#f97316;color:#fff}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
@media(max-width:600px){.cards{grid-template-columns:repeat(2,1fr)}}
.card{background:#fff;border-radius:8px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.08);text-align:center}
.card .label{font-size:11px;color:#888;margin-bottom:4px}
.card .value{font-size:20px;font-weight:700}
.card .value.orange{color:#f97316}
.card .value.blue{color:#3b82f6}
.card .unit{font-size:11px;color:#aaa;margin-top:2px}
.chart-box{background:#fff;border-radius:8px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:14px}
.chart-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.chart-title-row h2{font-size:13px;font-weight:600;color:#555}
.legend{display:flex;gap:14px;font-size:12px}
.legend span{display:flex;align-items:center;gap:4px}
.legend span::before{content:'';display:inline-block;width:24px;height:3px;border-radius:2px}
.leg-orange::before{background:#f97316}
.leg-blue::before{background:#3b82f6}
.chart-wrap{position:relative;height:360px}
.msg{text-align:center;padding:40px 16px;color:#888;font-size:13px;background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:14px;white-space:pre-line}
.msg.loading{color:#f97316}
.msg.error{color:#e53e3e}
footer{text-align:center;padding:16px;font-size:11px;color:#aaa;line-height:1.8}
</style>
</head>
<body>
<header>
  <h1>📈 株 売買回転日数チャート</h1>
  <span class="updated" id="updated"></span>
</header>
<div class="wrap">
  <div class="search-area">
    <div class="search-row">
      <input type="text" id="code-input" placeholder="銘柄コード例: 7203" maxlength="8">
      <button id="btn" onclick="search()">チャート表示</button>
    </div>
    <div class="chips" id="chips"></div>
  </div>

  <div class="cards" id="cards" style="display:none">
    <div class="card"><div class="label">銘柄</div><div class="value orange" id="c-name" style="font-size:13px;padding-top:4px"></div></div>
    <div class="card"><div class="label">最新 回転日数</div><div class="value orange" id="c-latest"></div><div class="unit">日</div></div>
    <div class="card"><div class="label">現在株価</div><div class="value blue" id="c-price"></div><div class="unit">円</div></div>
    <div class="card"><div class="label">回転日数 最小値</div><div class="value orange" id="c-min"></div><div class="unit">日（出来高が多い日）</div></div>
  </div>

  <div id="msg" class="msg">銘柄コードを入力するか、下のチップをクリックしてください</div>
  <div class="chart-box" id="chart-box" style="display:none">
    <div class="chart-title-row">
      <h2 id="chart-title"></h2>
      <div class="legend">
        <span class="leg-orange">回転日数（左軸）</span>
        <span class="leg-blue">株価（右軸）</span>
      </div>
    </div>
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
  </div>
</div>
<footer>
  データ: Yahoo Finance / kabutan.jp ／ 売買回転日数 = 発行済株式数 ÷ 日次出来高<br>
  ※ 情報提供のみが目的です。投資判断の根拠としないでください。
</footer>

<script src="data.js"></script>
<script>
const PROXY = 'https://corsproxy.io/?';
let chartInst = null;

function init() {
  if (!window.TURNOVER_META) return;
  document.getElementById("updated").textContent = "最終更新: " + TURNOVER_META.updated;
  const chips = document.getElementById("chips");
  TURNOVER_META.tickers.forEach(code => {
    const d = TURNOVER_DATA[code];
    if (!d) return;
    const el = document.createElement("span");
    el.className = "chip";
    el.textContent = code + " " + shortName(d.name);
    el.dataset.code = code;
    el.onclick = () => { document.getElementById("code-input").value = code; search(); };
    chips.appendChild(el);
  });
  if (TURNOVER_META.tickers.length > 0) {
    document.getElementById("code-input").value = TURNOVER_META.tickers[0];
    search();
  }
}

function shortName(name) { return name.length > 8 ? name.slice(0, 8) + "…" : name; }

async function search() {
  const code = document.getElementById("code-input").value.trim().replace(/[．.]/g, "");
  if (!code) return;
  document.querySelectorAll(".chip").forEach(c => c.classList.toggle("active", c.dataset.code === code));

  if (window.TURNOVER_DATA?.[code]) {
    // data.jsにあればYahoo Financeから株価だけ取得して重ねる
    setLoading(true);
    showMsg("株価データを取得中...", "loading");
    try {
      const base = TURNOVER_DATA[code];
      const prices = await fetchPrices(code, base.dates);
      showChart(code, base, prices);
    } catch(e) {
      showChart(code, TURNOVER_DATA[code], null);
    } finally { setLoading(false); }
    return;
  }

  setLoading(true);
  showMsg("取得中...", "loading");
  try {
    const d = await fetchLive(code);
    showChart(code, d, d.closes);
  } catch(e) {
    showMsg("エラー: " + e.message + "\n銘柄コードを確認してください（例: 7203）", "error");
    document.getElementById("cards").style.display = "none";
    document.getElementById("chart-box").style.display = "none";
  } finally { setLoading(false); }
}

function setLoading(on) {
  const btn = document.getElementById("btn");
  btn.disabled = on;
  btn.textContent = on ? "取得中..." : "チャート表示";
}

async function fetchPrices(code, dates) {
  const cr = await fetch(PROXY + encodeURIComponent(`https://query2.finance.yahoo.com/v8/finance/chart/${code}.T?range=6mo&interval=1d`));
  const cj = await cr.json();
  const result = cj?.chart?.result?.[0];
  if (!result) return null;
  const timestamps = result.timestamp || [];
  const closes = result.indicators?.quote?.[0]?.close || [];
  const priceMap = {};
  for (let i = 0; i < timestamps.length; i++) {
    const d = new Date(timestamps[i] * 1000).toISOString().split("T")[0];
    if (closes[i]) priceMap[d] = Math.round(closes[i] * 10) / 10;
  }
  return dates.map(d => priceMap[d] ?? null);
}

async function fetchLive(code) {
  const kr = await fetch(PROXY + encodeURIComponent(`https://kabutan.jp/stock/?code=${code}`));
  const html = await kr.text();
  const sm = html.match(/発行済株式数<\/th>\s*<td>([\d,]+)&nbsp;株/);
  if (!sm) throw new Error("銘柄が見つかりません（" + code + "）");
  const shares = parseInt(sm[1].replace(/,/g, ""));
  const nm = html.match(/<title>([^【]+)【/);
  const name = nm ? nm[1].trim() : code;

  const cr = await fetch(PROXY + encodeURIComponent(`https://query2.finance.yahoo.com/v8/finance/chart/${code}.T?range=6mo&interval=1d`));
  const cj = await cr.json();
  const result = cj?.chart?.result?.[0];
  if (!result) throw new Error("株価データが取得できません");

  const timestamps = result.timestamp || [];
  const volumes = result.indicators?.quote?.[0]?.volume || [];
  const closesRaw = result.indicators?.quote?.[0]?.close || [];
  const dates = [], vols = [], turnover = [], closes = [];
  for (let i = 0; i < timestamps.length; i++) {
    const v = volumes[i];
    if (!v || v === 0) continue;
    dates.push(new Date(timestamps[i] * 1000).toISOString().split("T")[0]);
    vols.push(Math.round(v));
    turnover.push(Math.round(shares / v * 10) / 10);
    closes.push(closesRaw[i] ? Math.round(closesRaw[i] * 10) / 10 : null);
  }
  if (!dates.length) throw new Error("出来高データが取得できません");
  return {name, shares, dates, volumes: vols, turnover, closes};
}

function showMsg(text, cls = "") {
  const el = document.getElementById("msg");
  el.style.display = ""; el.textContent = text; el.className = "msg " + cls;
}

function showChart(code, d, prices) {
  document.getElementById("msg").style.display = "none";
  document.getElementById("chart-box").style.display = "";
  document.getElementById("cards").style.display = "";

  const t = d.turnover;
  const latestPrice = prices ? prices.filter(p => p !== null).slice(-1)[0] : null;
  document.getElementById("c-name").textContent = d.name + "（" + code + "）";
  document.getElementById("c-latest").textContent = t[t.length - 1].toLocaleString();
  document.getElementById("c-price").textContent = latestPrice ? latestPrice.toLocaleString() : "—";
  document.getElementById("c-min").textContent = Math.min(...t).toLocaleString();
  document.getElementById("chart-title").textContent =
    d.name + "（" + code + "） 過去" + d.dates.length + "日";

  const datasets = [{
    label: "回転日数",
    data: t,
    borderColor: "#f97316",
    backgroundColor: "rgba(249,115,22,0.06)",
    pointRadius: 2, pointHoverRadius: 5,
    tension: 0.1, fill: true, borderWidth: 2,
    yAxisID: "yLeft"
  }];

  if (prices) {
    datasets.push({
      label: "株価",
      data: prices,
      borderColor: "#3b82f6",
      backgroundColor: "rgba(59,130,246,0.0)",
      pointRadius: 0, pointHoverRadius: 4,
      tension: 0.2, fill: false, borderWidth: 2,
      yAxisID: "yRight",
      spanGaps: true
    });
  }

  if (chartInst) chartInst.destroy();
  chartInst = new Chart(document.getElementById("chart").getContext("2d"), {
    type: "line",
    data: { labels: d.dates, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => {
              if (ctx.dataset.yAxisID === "yLeft")
                return "回転日数: " + ctx.parsed.y.toLocaleString() + " 日  出来高: " + d.volumes[ctx.dataIndex].toLocaleString() + " 株";
              return "株価: " + ctx.parsed.y?.toLocaleString() + " 円";
            }
          }
        }
      },
      scales: {
        x: { ticks: { maxTicksLimit: 10, maxRotation: 30 }, grid: { color: "#f0f0f0" } },
        yLeft: {
          type: "linear", position: "left",
          title: { display: true, text: "回転日数（日）", color: "#f97316" },
          ticks: { color: "#f97316" },
          grid: { color: "#f0f0f0" }
        },
        yRight: {
          type: "linear", position: "right",
          title: { display: !!prices, text: "株価（円）", color: "#3b82f6" },
          ticks: { color: "#3b82f6" },
          grid: { drawOnChartArea: false }
        }
      }
    }
  });
}

document.getElementById("code-input").addEventListener("keydown", e => { if (e.key === "Enter") search(); });
window.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
