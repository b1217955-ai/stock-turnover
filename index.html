<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>株 売買回転日数チャート</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;background:#f2f1ee;color:#1a1a1a;font-size:14px}
header{position:sticky;top:0;background:#fff;border-bottom:3px solid #f97316;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.06)}
header h1{font-size:17px;font-weight:800;color:#f97316}
header .updated{font-size:11px;color:#999}
.wrap{max-width:960px;margin:0 auto;padding:14px 14px 28px}

/* 検索 */
.search-box{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.search-row{display:flex;gap:8px}
.search-row input{flex:1;border:1.5px solid #e5e5e5;border-radius:8px;padding:10px 14px;font-size:15px;outline:none;min-width:0;transition:border-color .15s}
.search-row input:focus{border-color:#f97316}
.search-row button{background:#f97316;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:15px;font-weight:700;cursor:pointer;white-space:nowrap}
.search-row button:hover{background:#e8690a}
.search-row button:disabled{background:#d0d0d0;cursor:not-allowed}
.presets{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px}
.preset{background:#fff7f0;border:1.5px solid #f97316;color:#c25a00;border-radius:20px;padding:3px 12px;font-size:12px;cursor:pointer;font-weight:500;transition:all .15s}
.preset:hover{background:#f97316;color:#fff}

/* タブ */
.tabs-wrap{display:flex;align-items:center;gap:6px;overflow-x:auto;margin-bottom:10px;padding-bottom:2px;scrollbar-width:none}
.tabs-wrap::-webkit-scrollbar{display:none}
.tab{display:flex;align-items:center;gap:6px;background:#fff;border:1.5px solid #ddd;border-radius:8px;padding:6px 12px;font-size:13px;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.tab:hover{border-color:#f97316;color:#f97316}
.tab.active{background:#f97316;border-color:#f97316;color:#fff;font-weight:700}
.tab .close{font-size:16px;line-height:1;opacity:.6;margin-left:2px}
.tab:hover .close{opacity:1}
.tab.active .close{opacity:.8}

/* カード */
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}
@media(max-width:600px){.cards{grid-template-columns:repeat(2,1fr)}}
.card{background:#fff;border-radius:10px;padding:14px 10px;box-shadow:0 1px 4px rgba(0,0,0,.07);text-align:center}
.card .lbl{font-size:10px;color:#aaa;margin-bottom:5px;font-weight:600;letter-spacing:.5px}
.card .val{font-size:22px;font-weight:800;line-height:1.1}
.card .val.org{color:#f97316}.card .val.blu{color:#3b82f6}.card .val.sml{font-size:13px;padding-top:4px}
.card .unt{font-size:10px;color:#bbb;margin-top:3px}

/* チャート */
.chart-box{background:#fff;border-radius:12px;padding:16px 14px 12px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:10px}
.chart-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px;flex-wrap:wrap}
.chart-head h2{font-size:13px;font-weight:700;color:#444}
.legend{display:flex;gap:14px}
.leg{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600}
.leg-dot{width:26px;height:3px;border-radius:3px}
.chart-wrap{position:relative}

/* 相関分析 */
.corr-box{background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:10px}
.corr-box h3{font-size:14px;font-weight:700;color:#444;margin-bottom:14px}
.corr-note{font-size:11px;color:#aaa;margin-bottom:12px;line-height:1.6}
.corr-table{width:100%;border-collapse:collapse;font-size:12px;overflow:auto;display:block}
.corr-table th{background:#f7f6f3;padding:8px 10px;text-align:center;font-weight:700;white-space:nowrap;border:1px solid #eee}
.corr-table td{padding:8px 10px;text-align:center;border:1px solid #eee;font-weight:600;white-space:nowrap}
.corr-strong-pos{background:#fef3ec;color:#c2510a}
.corr-weak-pos{background:#fffaf5;color:#888}
.corr-weak-neg{background:#f0f6ff;color:#3b82f6}
.corr-strong-neg{background:#dbeafe;color:#1d4ed8}
.corr-self{background:#f7f6f3;color:#aaa}
.corr-chart-wrap{margin-top:16px}
.corr-chart-wrap h4{font-size:12px;font-weight:700;color:#555;margin-bottom:10px}

/* メッセージ */
.msg{text-align:center;padding:48px 16px;color:#bbb;font-size:13px;background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:10px;white-space:pre-line}
.msg.loading{color:#f97316}.msg.error{color:#e53e3e}

footer{text-align:center;padding:12px;font-size:11px;color:#bbb;line-height:1.9}
</style>
</head>
<body>
<header>
  <h1>📈 売買回転日数チャート</h1>
  <span class="updated" id="updated"></span>
</header>
<div class="wrap">
  <div class="search-box">
    <div class="search-row">
      <input type="text" id="inp" placeholder="銘柄コード（例: 7203）" maxlength="8" inputmode="numeric">
      <button id="btn" onclick="doSearch()">追加</button>
    </div>
    <div class="presets" id="presets"></div>
  </div>

  <div class="tabs-wrap" id="tabs-wrap" style="display:none"></div>

  <div id="msg" class="msg">銘柄コードを入力してください</div>

  <div id="main-area" style="display:none">
    <div class="cards" id="cards">
      <div class="card"><div class="lbl">銘柄</div><div class="val org sml" id="c-name"></div></div>
      <div class="card"><div class="lbl">最新 回転日数</div><div class="val org" id="c-turn"></div><div class="unt">日</div></div>
      <div class="card"><div class="lbl">現在株価</div><div class="val blu" id="c-price"></div><div class="unt">円</div></div>
      <div class="card"><div class="lbl">最小回転日数</div><div class="val org" id="c-min"></div><div class="unt">日（出来高ピーク）</div></div>
    </div>
    <div class="chart-box">
      <div class="chart-head">
        <h2 id="chart-title"></h2>
        <div class="legend">
          <div class="leg"><div class="leg-dot" style="background:#f97316"></div>回転日数</div>
          <div class="leg"><div class="leg-dot" style="background:#3b82f6"></div>株価</div>
        </div>
      </div>
      <div class="chart-wrap" id="chart-wrap"><canvas id="chart"></canvas></div>
    </div>
  </div>

  <div id="corr-area" style="display:none">
    <div class="corr-box">
      <h3>📊 回転日数の相関分析</h3>
      <div class="corr-note">
        各銘柄の売買回転日数の相関係数です。<br>
        <span style="color:#c2510a">■ 橙: 正の相関（同じ方向に動く）</span>　<span style="color:#1d4ed8">■ 青: 負の相関（逆方向に動く）</span>
      </div>
      <div style="overflow-x:auto"><table class="corr-table" id="corr-table"></table></div>
      <div class="corr-chart-wrap">
        <h4>回転日数の推移比較（全銘柄）</h4>
        <div style="position:relative;height:240px"><canvas id="corr-chart"></canvas></div>
      </div>
    </div>
  </div>
</div>
<footer>
  データ: Yahoo Finance / kabutan.jp ／ 回転日数 = 発行済株式数 ÷ 日次出来高<br>
  ※ 情報提供目的のみ。投資判断の根拠としないでください。
</footer>

<script src="data.js"></script>
<script>
const PROXY = 'https://corsproxy.io/?';
const cache = {};       // code → data
const tabs = [];        // [{code, name}]
let activeCode = null;
let mainChart = null;
let corrChart = null;

const COLORS = ['#f97316','#3b82f6','#10b981','#8b5cf6','#ef4444','#f59e0b','#06b6d4','#ec4899'];

function init() {
  if (!window.TURNOVER_META) return;
  document.getElementById('updated').textContent = '最終更新: ' + TURNOVER_META.updated;
  TURNOVER_META.tickers.forEach(code => {
    if (!TURNOVER_DATA[code]) return;
    cache[code] = TURNOVER_DATA[code];
    const el = document.createElement('span');
    el.className = 'preset';
    const d = TURNOVER_DATA[code];
    el.textContent = code + ' ' + (d.name.length > 6 ? d.name.slice(0,6)+'…' : d.name);
    el.onclick = () => { document.getElementById('inp').value = code; doSearch(); };
    document.getElementById('presets').appendChild(el);
  });
}

async function doSearch() {
  const code = document.getElementById('inp').value.trim().replace(/[．.]/g,'');
  if (!code) return;

  // すでにタブにある場合は切り替えるだけ
  if (tabs.find(t => t.code === code)) { switchTab(code); return; }

  setBtn(true);
  setMsg('取得中...', 'loading');
  try {
    let d = cache[code];
    if (!d) {
      d = await fetchLive(code);
      cache[code] = d;
    } else if (!d.closes) {
      d.closes = await fetchPrices(code, d.dates);
    }
    addTab(code, d.name);
    switchTab(code);
    document.getElementById('inp').value = '';
  } catch(e) {
    setMsg('エラー: ' + e.message, 'error');
  } finally { setBtn(false); }
}

function addTab(code, name) {
  if (tabs.find(t => t.code === code)) return;
  tabs.push({code, name});
  renderTabs();
}

function removeTab(code) {
  const idx = tabs.findIndex(t => t.code === code);
  if (idx === -1) return;
  tabs.splice(idx, 1);
  renderTabs();
  if (tabs.length === 0) {
    document.getElementById('main-area').style.display = 'none';
    document.getElementById('corr-area').style.display = 'none';
    document.getElementById('tabs-wrap').style.display = 'none';
    setMsg('銘柄コードを入力してください');
    activeCode = null;
  } else {
    const next = tabs[Math.min(idx, tabs.length-1)].code;
    switchTab(next);
  }
}

function renderTabs() {
  const wrap = document.getElementById('tabs-wrap');
  wrap.innerHTML = '';
  wrap.style.display = tabs.length ? '' : 'none';
  tabs.forEach(({code, name}) => {
    const el = document.createElement('div');
    el.className = 'tab' + (code === activeCode ? ' active' : '');
    el.innerHTML = `<span>${code} ${name.length>6?name.slice(0,6)+'…':name}</span><span class="close" onclick="event.stopPropagation();removeTab('${code}')">×</span>`;
    el.onclick = () => switchTab(code);
    wrap.appendChild(el);
  });
  renderCorr();
}

function switchTab(code) {
  activeCode = code;
  renderTabs();
  const d = cache[code];
  if (!d) return;

  document.getElementById('msg').style.display = 'none';
  document.getElementById('main-area').style.display = '';

  const t = d.turnover, p = d.closes;
  const latestPrice = p ? [...p].reverse().find(v=>v!==null) : null;
  document.getElementById('c-name').textContent = d.name + '（' + code + '）';
  document.getElementById('c-turn').textContent = t[t.length-1].toLocaleString();
  document.getElementById('c-price').textContent = latestPrice ? latestPrice.toLocaleString() : '—';
  document.getElementById('c-min').textContent = Math.min(...t).toLocaleString();
  document.getElementById('chart-title').textContent = d.name + '（' + code + '）　過去' + d.dates.length + '日間';

  const h = window.innerWidth < 600 ? 260 : 400;
  document.getElementById('chart-wrap').style.height = h + 'px';
  if (mainChart) mainChart.destroy();

  const datasets = [{
    label: '回転日数', data: t,
    borderColor: '#f97316',
    backgroundColor: ctx => { const g=ctx.chart.ctx.createLinearGradient(0,0,0,h); g.addColorStop(0,'rgba(249,115,22,.15)'); g.addColorStop(1,'rgba(249,115,22,0)'); return g; },
    pointRadius:0, pointHoverRadius:5, tension:.25, fill:true, borderWidth:2.5, yAxisID:'yL'
  }];
  if (p) datasets.push({
    label:'株価', data:p, borderColor:'#3b82f6', backgroundColor:'transparent',
    pointRadius:0, pointHoverRadius:5, tension:.25, fill:false, borderWidth:2, yAxisID:'yR', spanGaps:true
  });

  mainChart = new Chart(document.getElementById('chart').getContext('2d'), {
    type:'line', data:{labels:d.dates, datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      layout:{padding:{right:10}},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:'rgba(255,255,255,.97)', borderColor:'#e5e5e5', borderWidth:1,
          titleColor:'#333', bodyColor:'#555', padding:10, cornerRadius:8,
          callbacks:{
            title:c=>c[0].label,
            label:c=>c.dataset.yAxisID==='yL'?'  回転日数: '+c.parsed.y.toLocaleString()+' 日':'  株価: '+(c.parsed.y?.toLocaleString()||'—')+' 円',
            afterBody:c=>'  出来高: '+d.volumes[c[0].dataIndex].toLocaleString()+' 株'
          }
        }
      },
      scales:{
        x:{ticks:{maxTicksLimit:window.innerWidth<600?6:10,maxRotation:30,color:'#aaa',font:{size:11}},grid:{color:'#f0f0f0'}},
        yL:{type:'linear',position:'left',title:{display:true,text:'回転日数（日）',color:'#f97316',font:{size:11,weight:'bold'}},ticks:{color:'#f97316',font:{size:11},callback:v=>v.toLocaleString()},grid:{color:'#f0f0f0'}},
        yR:{type:'linear',position:'right',display:!!p,title:{display:!!p,text:'株価（円）',color:'#3b82f6',font:{size:11,weight:'bold'}},ticks:{color:'#3b82f6',font:{size:11},callback:v=>v.toLocaleString()},grid:{drawOnChartArea:false}}
      }
    }
  });
}

/* ---- 相関分析 ---- */
function pearson(a, b) {
  const n = a.length;
  if (n < 5) return null;
  const ma = a.reduce((s,v)=>s+v,0)/n, mb = b.reduce((s,v)=>s+v,0)/n;
  const num = a.reduce((s,v,i)=>s+(v-ma)*(b[i]-mb),0);
  const den = Math.sqrt(a.reduce((s,v)=>s+(v-ma)**2,0)*b.reduce((s,v)=>s+(v-mb)**2,0));
  return den ? +(num/den).toFixed(3) : null;
}

function alignTurnover(c1, c2) {
  const m1 = new Map(cache[c1].dates.map((d,i)=>[d,cache[c1].turnover[i]]));
  const m2 = new Map(cache[c2].dates.map((d,i)=>[d,cache[c2].turnover[i]]));
  const common = cache[c1].dates.filter(d=>m2.has(d));
  return {a: common.map(d=>m1.get(d)), b: common.map(d=>m2.get(d)), n: common.length};
}

function corrClass(r) {
  if (r === null) return '';
  if (r >= 0.5) return 'corr-strong-pos';
  if (r > 0)    return 'corr-weak-pos';
  if (r > -0.5) return 'corr-weak-neg';
  return 'corr-strong-neg';
}

function renderCorr() {
  const area = document.getElementById('corr-area');
  if (tabs.length < 2) { area.style.display = 'none'; return; }
  area.style.display = '';

  // 相関行列テーブル
  const codes = tabs.map(t=>t.code);
  const names = tabs.map(t=>t.name.length>6?t.name.slice(0,6)+'…':t.name);
  let html = '<tr><th></th>' + names.map(n=>`<th>${n}</th>`).join('') + '</tr>';
  codes.forEach((c1,i) => {
    html += `<tr><th>${names[i]}</th>`;
    codes.forEach((c2,j) => {
      if (i === j) { html += '<td class="corr-self">—</td>'; return; }
      const {a,b} = alignTurnover(c1,c2);
      const r = pearson(a,b);
      html += `<td class="${corrClass(r)}">${r !== null ? r.toFixed(2) : 'N/A'}</td>`;
    });
    html += '</tr>';
  });
  document.getElementById('corr-table').innerHTML = html;

  // 比較折れ線チャート（全銘柄の回転日数を正規化して重ねる）
  const allDates = [...new Set(tabs.flatMap(t=>cache[t.code].dates))].sort();
  const datasets = tabs.map(({code,name},i) => {
    const map = new Map(cache[code].dates.map((d,j)=>[d,cache[code].turnover[j]]));
    return {
      label: name.length>6?name.slice(0,6)+'…':name,
      data: allDates.map(d=>map.get(d)??null),
      borderColor: COLORS[i%COLORS.length],
      backgroundColor: 'transparent',
      pointRadius:0, pointHoverRadius:4,
      tension:.2, fill:false, borderWidth:2, spanGaps:true
    };
  });

  if (corrChart) corrChart.destroy();
  corrChart = new Chart(document.getElementById('corr-chart').getContext('2d'), {
    type:'line',
    data:{labels:allDates, datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:true,position:'top',labels:{boxWidth:20,font:{size:11}}},
        tooltip:{
          backgroundColor:'rgba(255,255,255,.97)',borderColor:'#e5e5e5',borderWidth:1,
          titleColor:'#333',bodyColor:'#555',padding:8,cornerRadius:8
        }
      },
      scales:{
        x:{ticks:{maxTicksLimit:8,maxRotation:30,color:'#aaa',font:{size:10}},grid:{color:'#f0f0f0'}},
        y:{title:{display:true,text:'回転日数（日）',font:{size:10}},ticks:{color:'#aaa',font:{size:10},callback:v=>v.toLocaleString()},grid:{color:'#f0f0f0'}}
      }
    }
  });
}

/* ---- ユーティリティ ---- */
function setBtn(on) { const b=document.getElementById('btn'); b.disabled=on; b.textContent=on?'取得中...':'追加'; }
function setMsg(t,cls='') { const el=document.getElementById('msg'); el.style.display=''; el.textContent=t; el.className='msg '+cls; }

async function fetchPrices(code,dates) {
  const r=await fetch(PROXY+encodeURIComponent(`https://query2.finance.yahoo.com/v8/finance/chart/${code}.T?range=6mo&interval=1d`));
  const j=await r.json(); const res=j?.chart?.result?.[0]; if(!res) return null;
  const ts=res.timestamp||[],cl=res.indicators?.quote?.[0]?.close||[];
  const map={}; ts.forEach((t,i)=>{if(cl[i]) map[new Date(t*1000).toISOString().split('T')[0]]=Math.round(cl[i]*10)/10;});
  return dates.map(d=>map[d]??null);
}

async function fetchLive(code) {
  const kr=await fetch(PROXY+encodeURIComponent(`https://kabutan.jp/stock/?code=${code}`));
  const html=await kr.text();
  const sm=html.match(/発行済株式数<\/th>\s*<td>([\d,]+)&nbsp;株/);
  if(!sm) throw new Error('銘柄が見つかりません（'+code+'）');
  const shares=parseInt(sm[1].replace(/,/g,''));
  const nm=html.match(/<title>([^【]+)【/);
  const name=nm?nm[1].trim():code;
  const r=await fetch(PROXY+encodeURIComponent(`https://query2.finance.yahoo.com/v8/finance/chart/${code}.T?range=6mo&interval=1d`));
  const j=await r.json(); const res=j?.chart?.result?.[0]; if(!res) throw new Error('株価データが取得できません');
  const ts=res.timestamp||[],vols=res.indicators?.quote?.[0]?.volume||[],cls=res.indicators?.quote?.[0]?.close||[];
  const dates=[],volumes=[],turnover=[],closes=[];
  for(let i=0;i<ts.length;i++){
    const v=vols[i]; if(!v||v===0) continue;
    dates.push(new Date(ts[i]*1000).toISOString().split('T')[0]);
    volumes.push(Math.round(v)); turnover.push(Math.round(shares/v*10)/10);
    closes.push(cls[i]?Math.round(cls[i]*10)/10:null);
  }
  if(!dates.length) throw new Error('出来高データが取得できません');
  return {name,shares,dates,volumes,turnover,closes};
}

document.getElementById('inp').addEventListener('keydown', e=>{if(e.key==='Enter') doSearch();});
window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
